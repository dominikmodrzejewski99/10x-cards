<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .display { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    </style>
  </defs>
  <rect width="1080" height="1080" fill="#0F172A"/>

  <text x="80" y="280" class="display" font-size="260" fill="#3B4CCA" fill-opacity="0.9">&#8222;</text>

  <text x="92" y="400" class="display" font-size="84" fill="#F5F1E8" letter-spacing="-0.84">Pamięć nie jest</text>
  <text x="92" y="496" class="display" font-size="84" fill="#F5F1E8" letter-spacing="-0.84">kwestią <tspan font-style="italic" fill="#3B4CCA">talentu</tspan>.</text>
  <text x="92" y="592" class="display" font-size="84" fill="#F5F1E8" letter-spacing="-0.84">To kwestia <tspan font-style="italic" fill="#3B4CCA">systemu</tspan>.</text>

  <text x="92" y="988" class="mono" font-size="16" letter-spacing="2.88" fill="#8a8579">— MANIFEST MEMLO</text>

