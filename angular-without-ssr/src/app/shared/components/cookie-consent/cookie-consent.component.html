<ng-container *transloco="let t; prefix: 'cookieConsent'">
  @if (!consentService.hasDecided()) {
    <div class="consent" role="dialog" aria-label="Cookie consent">
      <div class="consent__inner">
        <!-- Header -->
        <div class="consent__header">
          <i class="pi pi-shield consent__icon" aria-hidden="true"></i>
          <h2 class="consent__title">{{ t('title') }}</h2>
        </div>

        <!-- Message -->
        <p class="consent__text">
          {{ t('message') }}
          <a routerLink="/privacy" class="consent__link">{{ t('privacyLink') }}</a>
        </p>

        <!-- Expandable settings -->
        @if (showSettings()) {
          <div class="consent__settings">
            <!-- Necessary -->
            <div class="consent__category">
              <div class="consent__category-header">
                <div class="consent__category-info">
                  <span class="consent__category-name">{{ t('necessary') }}</span>
                  <span class="consent__category-badge consent__category-badge--always">{{ t('alwaysOn') }}</span>
                </div>
                <label class="consent__toggle consent__toggle--disabled">
                  <input type="checkbox" checked disabled />
                  <span class="consent__toggle-slider"></span>
                </label>
              </div>
              <p class="consent__category-desc">{{ t('necessaryDesc') }}</p>
            </div>

            <!-- Analytics -->
            <div class="consent__category">
              <div class="consent__category-header">
                <div class="consent__category-info">
                  <span class="consent__category-name">{{ t('analytics') }}</span>
                </div>
                <label class="consent__toggle">
                  <input
                    type="checkbox"
                    [checked]="analyticsEnabled()"
                    (change)="analyticsEnabled.set(!analyticsEnabled())" />
                  <span class="consent__toggle-slider"></span>
                </label>
              </div>
              <p class="consent__category-desc">{{ t('analyticsDesc') }}</p>
            </div>
          </div>
        }

        <!-- Actions -->
        <div class="consent__actions">
          <button type="button" class="consent__btn consent__btn--settings" (click)="toggleSettings()">
            <i class="pi pi-cog" aria-hidden="true"></i>
            {{ showSettings() ? t('hideSettings') : t('showSettings') }}
          </button>
          <div class="consent__actions-main">
            @if (showSettings()) {
              <button type="button" class="consent__btn consent__btn--save" (click)="saveCustom()">
                {{ t('saveBtn') }}
              </button>
            } @else {
              <button type="button" class="consent__btn consent__btn--reject" (click)="rejectNonEssential()">
                {{ t('rejectBtn') }}
              </button>
            }
            <button type="button" class="consent__btn consent__btn--accept" (click)="acceptAll()">
              {{ t('acceptBtn') }}
            </button>
          </div>
        </div>
      </div>
    </div>
  }
</ng-container>
