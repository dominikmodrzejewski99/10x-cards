<div
  class="flip-card"
  [class.flipped]="isFlippedSignal()"
  (click)="onFlip()"
  tabindex="0"
  role="button"
  [attr.aria-label]="isFlippedSignal() ? 'Kliknij aby zobaczyć pytanie' : 'Kliknij aby zobaczyć odpowiedź'">
  <div class="flip-card-inner">
    <div class="flip-card-front">
      <div class="card-label">Pytanie</div>
      <div class="card-content">{{ frontSignal() }}</div>
    </div>
    <div class="flip-card-back">
      <div class="card-label">Odpowiedź</div>
      <div class="card-content">{{ backSignal() }}</div>
    </div>
  </div>
</div>
