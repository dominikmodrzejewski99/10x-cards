<ng-container *transloco="let t; prefix: 'quiz.config'">
<div class="quiz-config">
  <div class="quiz-config__top-bar">
    <button class="quiz-config__back-btn" (click)="onGoBack()" [title]="t('back')" [attr.aria-label]="t('backAriaLabel')">
      <i class="pi pi-arrow-left"></i>
    </button>
    <div>
      <h1 class="quiz-config__title">{{ t('title', { setName: setNameSignal() }) }}</h1>
      <p class="quiz-config__subtitle">{{ t('subtitle', { count: cardCountSignal() }) }}</p>
    </div>
  </div>

  <div class="quiz-config__section">
    <label class="quiz-config__label">{{ t('questionCount') }}</label>
    <div class="quiz-config__count-row">
      <input
        type="number"
        class="quiz-config__count-input"
        [ngModel]="selectedCountSignal() === 'all' ? cardCountSignal() : selectedCountSignal()"
        (ngModelChange)="onCountChange($event)"
        [min]="1"
        [max]="cardCountSignal()"
        [disabled]="selectedCountSignal() === 'all'" />
      <label class="quiz-config__check-item quiz-config__all-toggle">
        <input
          type="checkbox"
          class="quiz-config__check-input"
          [checked]="selectedCountSignal() === 'all'"
          (change)="toggleAll()" />
        <span class="quiz-config__check-text">{{ t('all') }}</span>
      </label>
    </div>
  </div>

  <div class="quiz-config__section">
    <label class="quiz-config__label">{{ t('questionTypes') }}</label>
    <div class="quiz-config__checkboxes">
      <label class="quiz-config__check-item">
        <input
          type="checkbox"
          class="quiz-config__check-input"
          [checked]="writtenEnabledSignal()"
          (change)="writtenEnabledSignal.set(!writtenEnabledSignal())" />
        <span class="quiz-config__check-text">{{ t('written') }}</span>
      </label>
      <label class="quiz-config__check-item">
        <input
          type="checkbox"
          class="quiz-config__check-input"
          [checked]="multipleChoiceEnabledSignal()"
          (change)="multipleChoiceEnabledSignal.set(!multipleChoiceEnabledSignal())" />
        <span class="quiz-config__check-text">{{ t('multipleChoice') }}</span>
      </label>
      <label class="quiz-config__check-item">
        <input
          type="checkbox"
          class="quiz-config__check-input"
          [checked]="trueFalseEnabledSignal()"
          (change)="trueFalseEnabledSignal.set(!trueFalseEnabledSignal())" />
        <span class="quiz-config__check-text">{{ t('trueFalse') }}</span>
      </label>
    </div>
    @if (!isValid) {
      <small class="quiz-config__error">{{ t('validationError') }}</small>
    }
  </div>

  <div class="quiz-config__section">
    <label class="quiz-config__label">{{ t('direction') }}</label>
    <div class="quiz-config__radios">
      <label class="quiz-config__check-item">
        <input
          type="radio"
          name="direction"
          class="quiz-config__check-input"
          [checked]="!reversedSignal()"
          (change)="reversedSignal.set(false)" />
        <span class="quiz-config__check-text">{{ t('frontToBack') }}</span>
      </label>
      <label class="quiz-config__check-item">
        <input
          type="radio"
          name="direction"
          class="quiz-config__check-input"
          [checked]="reversedSignal()"
          (change)="reversedSignal.set(true)" />
        <span class="quiz-config__check-text">{{ t('backToFront') }}</span>
      </label>
    </div>
  </div>

  <div class="quiz-config__actions">
    <button
      class="quiz-config__btn quiz-config__btn--primary"
      [disabled]="!isValid"
      (click)="onStart()">
      <i class="pi pi-play"></i> {{ t('start') }}
    </button>
  </div>
</div>

</ng-container>
