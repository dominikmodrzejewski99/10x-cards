<div class="quiz-config">
  <div class="quiz-config__top-bar">
    <button class="quiz-config__back-btn" (click)="onGoBack()" title="Wróć" aria-label="Wróć do zestawu">
      <i class="pi pi-arrow-left"></i>
    </button>
    <div>
      <h1 class="quiz-config__title">Test: {{ setNameSignal() }}</h1>
      <p class="quiz-config__subtitle">{{ cardCountSignal() }} fiszek w zestawie</p>
    </div>
  </div>

  <div class="quiz-config__section">
    <label class="quiz-config__label">Liczba pytań</label>
    <div class="quiz-config__count-row">
      <input
        type="number"
        class="quiz-config__count-input"
        [ngModel]="selectedCountSignal() === 'all' ? cardCountSignal() : selectedCountSignal()"
        (ngModelChange)="onCountChange($event)"
        [min]="1"
        [max]="cardCountSignal()"
        [disabled]="selectedCountSignal() === 'all'" />
      <label class="quiz-config__check-item quiz-config__all-toggle">
        <input
          type="checkbox"
          class="quiz-config__check-input"
          [checked]="selectedCountSignal() === 'all'"
          (change)="toggleAll()" />
        <span class="quiz-config__check-text">Wszystkie</span>
      </label>
    </div>
  </div>

  <div class="quiz-config__section">
    <label class="quiz-config__label">Typy pytań</label>
    <div class="quiz-config__checkboxes">
      <label class="quiz-config__check-item">
        <input
          type="checkbox"
          class="quiz-config__check-input"
          [checked]="writtenEnabledSignal()"
          (change)="writtenEnabledSignal.set(!writtenEnabledSignal())" />
        <span class="quiz-config__check-text">Wpisywanie odpowiedzi</span>
      </label>
      <label class="quiz-config__check-item">
        <input
          type="checkbox"
          class="quiz-config__check-input"
          [checked]="multipleChoiceEnabledSignal()"
          (change)="multipleChoiceEnabledSignal.set(!multipleChoiceEnabledSignal())" />
        <span class="quiz-config__check-text">Wielokrotny wybór</span>
      </label>
      <label class="quiz-config__check-item">
        <input
          type="checkbox"
          class="quiz-config__check-input"
          [checked]="trueFalseEnabledSignal()"
          (change)="trueFalseEnabledSignal.set(!trueFalseEnabledSignal())" />
        <span class="quiz-config__check-text">Prawda / Fałsz</span>
      </label>
    </div>
    @if (!isValid) {
      <small class="quiz-config__error">Wybierz co najmniej jeden typ pytania</small>
    }
  </div>

  <div class="quiz-config__section">
    <label class="quiz-config__label">Kierunek</label>
    <div class="quiz-config__radios">
      <label class="quiz-config__check-item">
        <input
          type="radio"
          name="direction"
          class="quiz-config__check-input"
          [checked]="!reversedSignal()"
          (change)="reversedSignal.set(false)" />
        <span class="quiz-config__check-text">Przód → Tył</span>
      </label>
      <label class="quiz-config__check-item">
        <input
          type="radio"
          name="direction"
          class="quiz-config__check-input"
          [checked]="reversedSignal()"
          (change)="reversedSignal.set(true)" />
        <span class="quiz-config__check-text">Tył → Przód</span>
      </label>
    </div>
  </div>

  <div class="quiz-config__actions">
    <button
      class="quiz-config__btn quiz-config__btn--primary"
      [disabled]="!isValid"
      (click)="onStart()">
      <i class="pi pi-play"></i> Rozpocznij test
    </button>
  </div>
</div>
