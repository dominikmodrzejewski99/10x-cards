<div class="flist">
  <div class="flist__header">
    <div class="flist__title-row">
      <button class="flist__back" (click)="goBackToSets()" title="Wróć do zestawów">
        <i class="pi pi-arrow-left"></i>
      </button>
      <h1 class="flist__title" data-test-id="flashcards-title">{{ state().setName || 'Fiszki' }}</h1>
    </div>
    <div class="flist__actions">
      <a [routerLink]="['/study']" [queryParams]="{setId: state().setId}" class="flist__btn--study" data-test-id="start-study-button">
        <i class="pi pi-book"></i> Nauka
      </a>
      <a [routerLink]="['/quiz', state().setId]" class="flist__btn--quiz" data-test-id="start-quiz-button">
        <i class="pi pi-file-edit"></i> Test
      </a>
      <button (click)="openAddModal()" class="flist__btn flist__btn--add" data-test-id="add-flashcard-button">
        <i class="pi pi-plus"></i> Dodaj
      </button>
      <div class="flist__more">
        <button class="flist__btn flist__btn--more" (click)="moreMenuOpen.set(!moreMenuOpen())">
          <i class="pi pi-ellipsis-h"></i>
        </button>
        @if (moreMenuOpen()) {
          <div class="flist__more-menu" (click)="moreMenuOpen.set(false)">
            <button (click)="openImportModal()" class="flist__more-item" data-test-id="import-flashcards-button">
              <i class="pi pi-upload"></i> Importuj
            </button>
            <button (click)="exportCsv()" class="flist__more-item" data-test-id="export-csv-button">
              <i class="pi pi-download"></i> Eksport CSV
            </button>
            <button (click)="exportJson()" class="flist__more-item" data-test-id="export-json-button">
              <i class="pi pi-download"></i> Eksport JSON
            </button>
            <a routerLink="/generate" class="flist__more-item">
              <i class="pi pi-sparkles"></i> Generuj z AI
            </a>
          </div>
        }
      </div>
    </div>
  </div>

  @if (savedCountSignal() > 0) {
    <div class="flist__saved-banner fade-in">
      <div class="flist__saved-body">
        <i class="pi pi-check-circle"></i>
        <span>Zapisano <strong>{{ savedCountSignal() }}</strong> fiszek. Gotowy, żeby się ich nauczyć?</span>
      </div>
      <div class="flist__saved-actions">
        <a [routerLink]="['/study']" [queryParams]="{setId: state().setId}" class="flist__saved-cta">
          <i class="pi pi-play-circle"></i> Rozpocznij naukę
        </a>
        <button class="flist__saved-dismiss" (click)="dismissSavedBanner()">
          <i class="pi pi-times"></i>
        </button>
      </div>
    </div>
  }

  <div class="flist__table">
    <app-flashcard-table
      [flashcards]="state().flashcards"
      [loading]="state().loading"
      [totalRecords]="state().totalRecords"
      [rows]="state().rows"
      [first]="state().first"
      [sortField]="state().sortField"
      [sortOrder]="state().sortOrder"
      (editFlashcard)="openEditModal($event)"
      (deleteFlashcard)="handleDelete($event)"
      (lazyLoad)="loadFlashcards($event)"
      (search)="onSearch($event)"
      (bulkDelete)="handleBulkDelete($event)">
    </app-flashcard-table>
  </div>

  <p-dialog
    [header]="state().flashcardBeingEdited ? 'Edytuj fiszkę' : 'Dodaj nową fiszkę'"
    [visible]="state().isFormModalVisible"
    (visibleChange)="onCloseFormModal()"
    [modal]="true"
    [closeOnEscape]="true"
    [dismissableMask]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{width: '95vw', maxWidth: '560px'}"
    styleClass="modern-dialog"
    (onHide)="onCloseFormModal()"
    data-test-id="flashcard-dialog">
    <app-flashcard-form
      [isVisible]="state().isFormModalVisible"
      [flashcardToEdit]="state().flashcardBeingEdited"
      (save)="onSave($event)"
      (close)="onCloseFormModal()">
    </app-flashcard-form>
  </p-dialog>

  @if (lastDeletedSignal()) {
    <div class="flist__undo">
      <span class="flist__undo-text">Fiszka usunięta</span>
      <button class="flist__undo-btn" (click)="undoDelete()">Cofnij</button>
      <button class="flist__undo-close" (click)="dismissUndo()" aria-label="Zamknij">
        <i class="pi pi-times"></i>
      </button>
    </div>
  }

  <p-toast position="bottom-center"></p-toast>
  <p-confirmDialog
    styleClass="modern-dialog"
    [style]="{width: '95vw', maxWidth: '420px'}"
    icon="pi pi-exclamation-triangle"
    data-test-id="confirm-dialog">
  </p-confirmDialog>

  <app-import-modal
    [isVisible]="state().isImportModalVisible"
    [setId]="state().setId"
    [isSaving]="state().loading"
    (close)="onCloseImportModal()"
    (saved)="onImportSaved($event)"
    data-test-id="import-modal">
  </app-import-modal>
</div>
