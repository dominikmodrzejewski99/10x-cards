<div class="proposals">
  @if (proposalsSignal().length === 0) {
  <div class="proposals__empty">
    <p>Brak propozycji fiszek do wyświetlenia</p>
    <p class="proposals__empty-hint">Wygeneruj fiszki, aby zobaczyć propozycje</p>
  </div>
  }

  @for (proposal of proposalsSignal(); track $index) {
  <div
    class="proposal"
    [class.proposal--accepted]="proposal.accepted"
    [attr.data-test-id]="'flashcard-proposal-' + $index">

    <div class="proposal__number">
      @if (proposal.accepted) {
        <i class="pi pi-check"></i>
      } @else {
        {{ $index + 1 }}
      }
    </div>

    <div class="proposal__body">
      <div class="proposal__content">
        <div class="proposal__side">
          <span class="proposal__label">P</span>
          <span class="proposal__text">{{ proposal.front }}</span>
        </div>
        <div class="proposal__side proposal__side--back">
          <span class="proposal__label proposal__label--back">O</span>
          <span class="proposal__text">{{ proposal.back }}</span>
        </div>
      </div>

      <div class="proposal__actions">
        <button
          class="proposal__btn proposal__btn--accept"
          [class.proposal__btn--accepted]="proposal.accepted"
          (click)="onAccept(proposal)"
          [attr.aria-label]="proposal.accepted ? 'Cofnij akceptację' : 'Akceptuj'"
          [attr.data-test-id]="'accept-flashcard-button-' + $index">
          <i class="pi" [class.pi-check-circle]="proposal.accepted" [class.pi-check]="!proposal.accepted"></i>
          {{ proposal.accepted ? 'Zaakceptowano' : 'Akceptuj' }}
        </button>
        <button
          class="proposal__btn proposal__btn--edit"
          (click)="openEditDialog(proposal)"
          aria-label="Edytuj">
          <i class="pi pi-pencil"></i>
          Edytuj
        </button>
        <button
          class="proposal__btn proposal__btn--reject"
          (click)="onReject(proposal)"
          aria-label="Odrzuć"
          [attr.data-test-id]="'reject-flashcard-button-' + $index">
          <i class="pi pi-trash"></i>
          Odrzuć
        </button>
      </div>
    </div>
  </div>
  }
</div>

<p-dialog
  [(visible)]="editDialogVisible"
  [style]="{width: '560px'}"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closeOnEscape]="true"
  [dismissableMask]="true"
  [baseZIndex]="1000"
  styleClass="edit-dialog-custom"
  header="Edytuj fiszkę">

  <div class="edit-form">
    <div class="edit-form__field">
      <label for="front" class="edit-form__label">Przód (pytanie)</label>
      <textarea
        id="front"
        pTextarea
        [(ngModel)]="editedProposal.front"
        [autoResize]="true"
        rows="3"
        class="edit-form__textarea"
        placeholder="Wpisz pytanie lub pojęcie...">
      </textarea>
    </div>
    <div class="edit-form__field">
      <label for="back" class="edit-form__label">Tył (odpowiedź)</label>
      <textarea
        id="back"
        pTextarea
        [(ngModel)]="editedProposal.back"
        [autoResize]="true"
        rows="3"
        class="edit-form__textarea"
        placeholder="Wpisz odpowiedź lub definicję...">
      </textarea>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="edit-form__footer">
      <button class="edit-form__btn edit-form__btn--cancel" (click)="closeEditDialog()">
        Anuluj
      </button>
      <button class="edit-form__btn edit-form__btn--save" (click)="saveEdit()">
        <i class="pi pi-check"></i> Zapisz
      </button>
    </div>
  </ng-template>
</p-dialog>
