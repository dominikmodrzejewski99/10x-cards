<button
  type="button"
  [disabled]="disabledSignal()"
  (click)="onClick()"
  class="save-btn"
  [attr.data-test-id]="'save-all-flashcards-button'"
>
  @if (!loadingSignal()) {
  <i class="pi pi-save"></i>
  } @else {
  <i class="pi pi-spin pi-spinner"></i>
  }
  <span>{{ loadingSignal() ? 'Zapisywanie...' : labelSignal() }}</span>
</button>
