<button
  type="button"
  [disabled]="disabledSignal()"
  (click)="onClick()"
  class="gen-btn"
  [attr.data-test-id]="'generate-flashcards-button'"
>
  @if (!loadingSignal()) {
  <i class="pi pi-bolt"></i>
  } @else {
  <i class="pi pi-spin pi-spinner"></i>
  }
  <span>{{ loadingSignal() ? 'Generowanie...' : 'Generuj Fiszki' }}</span>
</button>
