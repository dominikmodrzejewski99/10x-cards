<div class="source">
  <label for="sourceText" class="source__label">Tekst Źródłowy</label>
  <div class="source__wrap">
    <textarea
      id="sourceText"
      [(ngModel)]="text"
      (ngModelChange)="onTextChange($event)"
      (blur)="onBlur()"
      class="source__textarea"
      [class.source__textarea--error]="touched && !isTextValid() && currentLength > 0"
      placeholder="Wklej tutaj tekst źródłowy (min. 1000 znaków, maks. 10000 znaków)..."
      [attr.data-test-id]="'source-text-input'">
    </textarea>
  </div>

  <div class="source__footer">
    <div class="source__errors">
      @if (touched && isTooShort()) {
      <div class="source__error">
        <i class="pi pi-exclamation-circle"></i>
        <small>Tekst musi zawierać co najmniej {{ minLengthSignal() }} znaków</small>
      </div>
      }
      @if (isTooLong()) {
      <div class="source__error">
        <i class="pi pi-exclamation-circle"></i>
        <small>Tekst może zawierać maksymalnie {{ maxLengthSignal() }} znaków</small>
      </div>
      }
    </div>

    <span
      class="source__counter"
      [class.source__counter--error]="touched && !isTextValid() && currentLength > 0"
      [class.source__counter--valid]="isTextValid()"
    >
      {{ currentLength }} / {{ maxLengthSignal() }} znaków
    </span>
  </div>
</div>
