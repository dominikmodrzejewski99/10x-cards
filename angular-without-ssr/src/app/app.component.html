@if (navigatingSignal()) {
  <div class="app__nav-progress" aria-hidden="true">
    <div class="app__nav-progress-bar"></div>
  </div>
}

<div class="app">
  <app-auth-navbar></app-auth-navbar>

  <main class="app__main" id="main-content">
    <div class="app__route-container" [class.app__route-container--navigating]="navigatingSignal()">
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer class="app__footer" [class.app__footer--has-bottom-nav]="isAuthenticatedSignal()">
    <span class="app__footer-brand">Memlo</span>
    <span class="app__footer-copy">&copy; {{ currentYear }}</span>
    <span class="app__footer-sep">·</span>
    <a routerLink="/terms" class="app__footer-link">{{ 'footer.terms' | transloco }}</a>
    <span class="app__footer-sep">·</span>
    <a routerLink="/privacy" class="app__footer-link">{{ 'footer.privacy' | transloco }}</a>
    <span class="app__footer-sep">·</span>
    <button class="app__footer-link app__footer-btn" (click)="openCookieSettings()">{{ 'footer.cookies' | transloco }}</button>
    @if (isAuthenticatedSignal()) {
      <span class="app__footer-sep">·</span>
      <a routerLink="/feedback" class="app__footer-link">{{ 'footer.feedback' | transloco }}</a>
    }
  </footer>

  <app-bottom-nav></app-bottom-nav>
</div>

<app-toast></app-toast>
<app-confirm-dialog></app-confirm-dialog>
<app-onboarding></app-onboarding>
<app-cookie-consent></app-cookie-consent>
