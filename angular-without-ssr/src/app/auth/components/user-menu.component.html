<ng-container *transloco="let t; prefix: 'auth.userMenu'">
  <div class="user-menu-container">
    @if (isAuthenticatedSignal() && userSignal()?.is_anonymous) {
      <a routerLink="/feedback" class="feedback-btn">
        <i class="pi pi-comment"></i>
        {{ t('feedback') }}
      </a>
      <button class="logout-btn" (click)="onLogout()">
        <i class="pi pi-sign-out"></i>
        {{ t('endSession') }}
      </button>
    } @else if (isAuthenticatedSignal()) {
      <div class="user-menu-dropdown">
        <button class="user-menu-button" [class.is-open]="isMenuOpenSignal()" (click)="toggleMenu()">
          <div class="user-avatar">
            {{ userInitialsSignal() }}
          </div>
          <span class="user-email">{{ userSignal()?.email }}</span>
          <i class="pi pi-chevron-down chevron" [class.chevron--open]="isMenuOpenSignal()"></i>
        </button>

        @if (isMenuOpenSignal()) {
          <div class="dropdown-backdrop" (click)="closeMenu()"></div>
          <div class="dropdown-menu">
            <div class="dropdown-header">
              <div class="user-avatar user-avatar--lg">{{ userInitialsSignal() }}</div>
              <div class="user-info">
                <span class="user-name">{{ t('myAccount') }}</span>
                <span class="user-email-small">{{ userSignal()?.email }}</span>
              </div>
            </div>
            <div class="dropdown-body">
              <a routerLink="/settings" class="dropdown-item" (click)="closeMenu()">
                <i class="pi pi-cog"></i>
                {{ t('settings') }}
              </a>
              <a routerLink="/feedback" class="dropdown-item" (click)="closeMenu()">
                <i class="pi pi-comment"></i>
                {{ t('feedback') }}
              </a>
            </div>
            <div class="dropdown-footer">
              <button class="dropdown-item dropdown-item--delete" (click)="onDeleteAccount()">
                <i class="pi pi-trash"></i>
                {{ t('deleteAccount') }}
              </button>
              <button class="dropdown-item dropdown-item--logout" (click)="onLogout()">
                <i class="pi pi-sign-out"></i>
                {{ t('logout') }}
              </button>
            </div>
          </div>
        }
      </div>
    }
    <app-dialog
      [header]="t('deleteAccountDialogTitle')"
      [visible]="isDeleteDialogVisibleSignal()"
      (visibleChange)="cancelDeleteAccount()"
      [maxWidth]="'420px'">
      <div class="delete-dialog">
        <i class="pi pi-exclamation-triangle delete-dialog__icon"></i>
        <p class="delete-dialog__text" [innerHTML]="t('deleteAccountWarning')"></p>
        <p class="delete-dialog__prompt" [innerHTML]="t('deleteAccountPrompt')"></p>
        <input
          type="text"
          class="delete-dialog__input"
          [(ngModel)]="deleteConfirmText"
          [placeholder]="t('deleteConfirmWord')"
          autocomplete="off" />
        <div class="delete-dialog__actions">
          <button class="delete-dialog__btn delete-dialog__btn--cancel" (click)="cancelDeleteAccount()">{{ t('cancel') }}</button>
          <button
            class="delete-dialog__btn delete-dialog__btn--delete"
            [disabled]="deleteConfirmText.trim().toUpperCase() !== t('deleteConfirmWord').toUpperCase()"
            (click)="confirmDeleteAccount()">
            {{ t('deleteAccount') }}
          </button>
        </div>
      </div>
    </app-dialog>
  </div>
</ng-container>
