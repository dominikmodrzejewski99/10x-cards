<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .display { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .sans { font-family: 'Inter', -apple-system, sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0F172A" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#F8FAFC"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <line x1="80" y1="0" x2="80" y2="630" stroke="#3B4CCA" stroke-opacity="0.25" stroke-width="1"/>

  <text x="96" y="72" class="mono" font-size="14" letter-spacing="2.5" fill="#475569">MEMLO · INTELIGENTNE FISZKI</text>
  <text x="1152" y="72" class="mono" font-size="14" letter-spacing="2.5" fill="#475569" text-anchor="end">ALGORYTM SM-2</text>

  <text x="96" y="280" class="display" font-size="140" fill="#0F172A" letter-spacing="-2.8">Przestań zapominać.</text>
  <text x="96" y="420" class="display" font-size="140" fill="#3B4CCA" font-style="italic" letter-spacing="-2.8">Zacznij pamiętać.</text>

  <g transform="translate(96,510) scale(0.44)">
    <g transform="translate(50 54) rotate(-10) translate(-28 -34)">
      <rect width="56" height="68" rx="8" fill="#EDEFFF"/>
    </g>
    <g transform="translate(52 50) rotate(8) translate(-28 -34)">
      <rect width="56" height="68" rx="8" fill="#3B4CCA"/>
      <text x="28" y="46" text-anchor="middle" font-family="Instrument Serif, Georgia, serif" font-size="40" font-style="italic" fill="#FFFFFF">?</text>
    </g>
  </g>
  <text x="148" y="568" class="display" font-size="40" fill="#0F172A" letter-spacing="-0.4">Meml<tspan font-style="italic" fill="#3B4CCA">o</tspan></text>

  <text x="1152" y="570" class="mono" font-size="14" fill="#1E293B" text-anchor="end">memlo.app</text>
</svg>
