      <rect x="28" y="2" width="62" height="82" rx="10" fill="#0F172A"/>
      <path d="M44 30 L44 58 L54 48 L64 58 L64 30" stroke="#3B4CCA" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
