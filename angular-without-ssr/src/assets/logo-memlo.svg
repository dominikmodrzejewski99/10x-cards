<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b6bff"/>
      <stop offset="100%" stop-color="#3344ee"/>
    </linearGradient>
    <linearGradient id="badge" x1="28" y1="10" x2="36" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d67a"/>
      <stop offset="100%" stop-color="#17b865"/>
    </linearGradient>
    <linearGradient id="accent" x1="126" y1="8" x2="160" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b6bff"/>
      <stop offset="100%" stop-color="#3344ee"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="2" y="4" width="40" height="40" rx="10" fill="url(#icon-bg)"/>

  <!-- Card stack -->
  <rect x="9" y="14" width="18" height="23" rx="3" fill="#fff" opacity="0.15" transform="rotate(-8 18 25)"/>
  <rect x="14" y="11" width="18" height="23" rx="3" fill="#fff" opacity="0.25"/>
  <rect x="19" y="8" width="18" height="23" rx="3" fill="#fff"/>

  <!-- Card lines -->
  <rect x="23" y="14" width="10" height="1.6" rx="0.8" fill="#4255ff" opacity="0.75"/>
  <rect x="23" y="18" width="7" height="1.2" rx="0.6" fill="#4255ff" opacity="0.3"/>
  <rect x="23" y="21.5" width="9" height="1.2" rx="0.6" fill="#4255ff" opacity="0.18"/>

  <!-- Badge -->
  <circle cx="34" cy="28" r="5" fill="url(#badge)"/>
  <path d="M31.8 28 L33.2 29.4 L36.2 26.4" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="50" y="34" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="30" fill="#282e3e" letter-spacing="-0.5">mem</text>
  <text x="128" y="34" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="30" fill="url(#accent)" letter-spacing="-0.5">lo</text>
</svg>
