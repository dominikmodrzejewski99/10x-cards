  <body>
    <app-root>
      <!-- Critical inline content for instant FCP (replaced by Angular on bootstrap) -->
      <style>
        .shell{display:block;background:#fff}
        .shell__inner{max-width:1100px;margin:0 auto;padding:5rem 1.5rem 4.5rem;text-align:center}
        .shell__pill{display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem;font-weight:600;color:#4255ff;background:#edefff;padding:.35rem .9rem;border-radius:999px;margin-bottom:1.5rem}
        .shell__title{font-size:3.25rem;font-weight:800;line-height:1.08;color:#282e3e;letter-spacing:-.03em;margin:0 0 1.25rem}
        .shell__accent{color:#4255ff}
        .shell__desc{font-size:1.15rem;color:#586380;max-width:520px;margin:0 auto;line-height:1.7}
        @media(max-width:768px){.shell__inner{padding:3.5rem 1.25rem 3rem}.shell__title{font-size:2.25rem}}
        @media(max-width:480px){.shell__title{font-size:1.85rem}.shell__desc{font-size:.95rem}}
      </style>
      <div class="shell">
        <div class="shell__inner">
          <span class="shell__pill">Fiszki wspierane przez AI</span>
          <h1 class="shell__title">Zamień notatki w wiedzę.<br/><span class="shell__accent">Bez ślęczenia nad kartkami.</span></h1>
          <p class="shell__desc">Wrzuć tekst z wykładu, podręcznika albo artykułu. Dostaniesz gotowe fiszki, pogrupowane w zestawy, z planem powtórek dopasowanym do Twojego tempa.</p>
